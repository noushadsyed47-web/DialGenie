spring.application.name=auth-service
server.port=8081

# JWT Configuration
jwt.secret=${JWT_SECRET:dialgenie-super-secret-key-change-in-production-12345}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Logging
logging.level.root=INFO
logging.level.com.dialgenie=DEBUG

# Application Configuration
app.name=DialGenie Auth Service
app.version=1.0.0
