spring.application.name=api-gateway
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.dialgenie=DEBUG

# Application Configuration
app.name=DialGenie API Gateway
app.version=1.0.0

# DataSource (SQLite)
spring.datasource.url=jdbc:sqlite:C:/DialGenie/dialgenie.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.hibernate.ddl-auto=none

# Run as reactive application for Spring Cloud Gateway
spring.main.web-application-type=reactive

# Disable Spring Cloud compatibility check (local dev)
spring.cloud.compatibility-verifier.enabled=false
